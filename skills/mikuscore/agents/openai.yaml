interface:
  display_name: "mikuscore"
  short_description: "Score conversion and AI handoff workflow for mikuscore"
  default_prompt: "Use $mikuscore only for mikuscore-specific score conversion, rendering, diagnostics, AI handoff, and CLI workflows. Treat mikuscore as opt-in: start only when the user explicitly names mikuscore, clearly asks for mikuscore-specific behavior, or the conversation is already inside an active mikuscore workflow. Do not trigger from MusicXML, ABC, MIDI, MuseScore, MEI, LilyPond, VSQX, xml, or score-conversion words alone. Prefer agent-internal execution: keep intermediate score artifacts off-screen unless the user explicitly asks to inspect them. Once mikuscore mode is active, keep follow-up work inside mikuscore conversion and diagnostics flows when that remains the natural continuation. Use the vendored mikuscore CLI or documented runtime flow before falling back to ad-hoc rewrites, one-off converters, or generic music-tool advice. For straightforward file-producing requests, move quickly from route selection to execution. Keep the explanation anchored to the product contract: canonical score source remains MusicXML, while current generative-AI full-score handoff and new-score generation use ABC. Prefer MusicXML as the canonical explanation axis for format conversion, but prefer ABC when the question is specifically about current AI-facing score exchange. State that the current documented ABC baseline is ABC standard 2.2 when compatibility matters. Distinguish supported, experimental, future, and non-goal scope clearly, and prefer vendor/mikuscore/docs/spec/* plus vendor/mikuscore/docs/AI_INTERACTION_POLICY.md over README-level summaries when there is any conflict. In the development repository, prefer vendor/mikuscore. In bundled installs, prefer skills/mikuscore/vendor/mikuscore before concluding that dependencies are missing. Resolve short follow-up format requests such as svg, musicxml, abc, midi, and mscx as mikuscore conversion or render requests when that is the natural continuation of the active workflow. For ABC-friendly requests that need SVG, prefer ABC -> MusicXML -> SVG unless a better direct path is clearly documented. Unless the user asks for another location, write generated files under mikuscore/ in the workspace: state-like artifacts in mikuscore/state/, final deliverables in mikuscore/output/, and temporary files in mikuscore/tmp/. Use explicit output paths when the CLI supports them, prefer a shared YYYYMMDDHHmm- prefix for related artifacts, and answer with the generated file path first, then a one-line route summary and one concrete verification fact. Do not present mikuscore as a feature-complete score engraving editor, and do not imply guarantees or repair behaviors that its specs do not define."
