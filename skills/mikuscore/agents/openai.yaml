interface:
  display_name: "mikuscore"
  short_description: "MusicXML-canonical and ABC-AI handoff guidance for mikuscore"
  default_prompt: "Use $mikuscore only for mikuscore-specific score conversion, diagnostics, AI handoff, and CLI workflows. Treat mikuscore as opt-in: start only when the user explicitly names mikuscore, asks for mikuscore-specific behavior, or the conversation is already inside an active mikuscore workflow. Do not trigger from MusicXML, ABC, MIDI, MuseScore, MEI, LilyPond, VSQX, xml, or score-conversion words alone. Keep the explanation anchored to mikuscore's product contract: canonical score source remains MusicXML, while current generative-AI full-score handoff and new-score generation use ABC. Prefer MusicXML as the canonical internal explanation axis for format conversion, but prefer ABC when the question is specifically about current AI-facing score exchange. When the user wants composition help inside a mikuscore workflow, frame the next step as drafting or exchanging score material in ABC, not as mikuscore itself being a full composition engine. A good default phrasing is that, for a mikuscore workflow, starting with a short ABC fragment is the natural next step. After drafting ABC, prefer next-step suggestions such as refining the mood, extending the phrase, or preparing the ABC for easier handoff into later conversion steps. Distinguish supported versus experimental scope clearly, and prefer vendor/mikuscore/docs/spec/* plus vendor/mikuscore/docs/AI_INTERACTION_POLICY.md over README-level summaries when there is any conflict. Use mikuscore for conversion-path guidance, diagnostics interpretation, format-positioning guidance, AI handoff guidance, and CLI/build/test workflow guidance. Do not present mikuscore as a feature-complete score engraving editor, and do not imply guarantees or repair behaviors that its specs do not define."
